name: Update Upcoming Shows

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run show scraper
        run: node scraper/scrape.js
        env:
          TZ: America/New_York

      - name: Commit updated shows.json if changed
        run: |
          git config --global user.name  "Shows Bot"
          git config --global user.email "bot@dpsportscards.local"
          git add shows.json
          git diff --staged --quiet || (git commit -m "Update upcoming shows [skip ci]" && git push)
