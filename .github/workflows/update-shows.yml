name: Update Upcoming Shows

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - run: npm install

      - name: Run show scraper
        run: node scraper/scrape.js
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          TZ: America/New_York

      - name: Commit if changed
        run: |
          git config --global user.name "Shows Bot"
          git config --global user.email "bot@dpsportscards.local"
          git add shows.json
          git diff --staged --quiet || (git commit -m "Update upcoming shows [skip ci]" && git push)
